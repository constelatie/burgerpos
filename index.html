<html>
    <head>
        <title>Welcome to Christiana's!</title>
        <!-- pulls in the handlebars js -->
         <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>
         <link rel="stylesheet" href="posstyle.css">
         <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <!-- pulls in the bootstrap -->
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
          <!-- pulls in the controller js -->
    </head>
    <body>
        <!-- uses the view widget of the controller-view-model task -->
        <div id="view_widget"></div>
         <!-- start template, first thing people will see when they come to the site -->
        <script id="starttemplate" type="text/x-handlebars-template">
            <div class="start, container-fluid">
            <h1>Welcome to Christiana's!</h1>
            <p>We are a family owned burger restaurant located in the heart of downtown.</p>
            <p>We pride ourselves on using only the freshest ingredients and providing a welcoming atmosphere for our customers.</p>
            <!-- prompts user to input name, required field. bootstrap button to begin ordering! -->
            <form id="name">
                <label for="customername">Please enter your name to start your order:</label>
                <input type="text" id="customername" name="customername" required/> <br/>
                <input type="submit" value="Start Order" class="btn btn-dark"/>
                </form>
            </div>
        </script>
        <!-- switches over to the menu screen, where it pulls the value of customername to display to the user. -->
        <script id="menutemplate" type="text/x-handlebars-template">
            <div class="menu">
            <h2>Hi, <span id="customername">{{customerName}}</span>! What would you like to order?</h2>
            <h2>Our Menu</h2>
        <ul>
            <li>Classic Burger - $8.99</li>
            <li>Cheeseburger - $9.99</li>
            <li>Fries - $2.99</li>
            <li>Onion Rings - $3.99</li>
            <li>Soda - $1.99</li>
        </ul>
        <!-- takes you to the next screen to start ordering after looking at the menu ( though only cheeseburger and classic burgers are available ) -->
        <button id="ready" class="btn btn-dark">I'm Ready to Order</button>
            </div>
        </script>
        <!-- view to pick your burger-->
        <script id="orderform" type="text/x-handlebars-template">
        <h2>Order Now</h2>
         <form id="customerorder">
            <label for="burger">Burger:</label>
            <select id="burger" name="burger">
                <option value="classic">Classic Burger</option>
                <option value="cheeseburger">Cheeseburger</option>
            </select><br>
            <input type="submit" id="placeorder" value="Begin Customization" class="btn btn-dark"/>
        </form> 
        </script>
        <!-- start to customize your burger -->
         <!-- looked up handlebars documentation for helpers: https://handlebarsjs.com/guide/builtin-helpers.html -->
        <script id="steptemplate" type="text/x-handlebars-template">
            <!-- feedback from previous step shows up top -->
            {{#if feedback}}
                <div class="feedback">{{feedback}}</div>
            {{/if}}
            <!-- pulling from the current order json to display progress -->
             <!-- double curly bracket is handlebars dynamic placeholder until js tells it what to do/display-->
            <h3>{{title}}</h3>
            <div class="progressbox">
        <p><strong>Your Burger So Far:</strong></p>
        <ul>
            <li><strong>Customer Name:</strong> {{username}}</li>
            <li><strong>Base:</strong> {{selectedBurger}}</li>
            {{#if currentOrder.bun}}
                <li>Bun: {{currentOrder.bun}}</li>
            {{/if}}
            {{#if currentOrder.protein}}
                <li>Protein: {{currentOrder.protein}}</li>
            {{/if}}
            {{#if currentOrder.toppings}}
                <li>Toppings: {{currentOrder.toppings}}</li>
            {{/if}}
            {{#if currentOrder.sauces}}
                <li>Sauces: {{currentOrder.sauces}}</li>
            {{/if}}
            {{#if currentOrder.saucecount}}
                <li>Sauce Count: {{currentOrder.saucecount}}</li>
            {{/if}}
             {{#if currentOrder.extras}}
                <li>Extras: {{currentOrder.extras}}</li>
            {{/if}}
             {{#if currentOrder.presentation}}
                <li>Presentation: {{currentOrder.presentation}}</li>
            {{/if}}
        </ul>
    </div>
            <form id="stepform">
 <!-- the if handlebar helper to check the type of input the user is using. pushes the values of the json from the js, rather than having to hard code the values as text -->
        {{#if isText}}
            <input type="text" id="textInput">
        {{/if}}
         {{#if isCheckbox}}
            {{#each options}}
                <label>
                    <input type="checkbox" name="option" value="{{this}}">
                    {{this}}
                </label><br>
            {{/each}}
        {{/if}}
        {{#if isMultipleChoice}}
            {{#each options}}
                <label>
                    <input type="radio" name="option" value="{{this}}">
                    {{this}}
                </label><br>
            {{/each}}
        {{/if}}
        {{#if isImageSelection}}
            {{#each imageOptions}}
                <label>
                    <input type="radio" name="option" value="{{url}}">
                    <img src="{{url}}" width="100" height="100">
                </label><br>
            {{/each}}
        {{/if}}
        <br>
        <!-- submit button that moves to the next step, and pushes the selections to the progress box -->
        <button type="submit" class="btn btn-dark" id="next">Next</button>
    </form>
        </script>
        <!-- shows the complete order -->
       <script id="summary" type="text/x-handlebars-template">
    <div class="summary">
        <h2>Order Complete, {{username}}!</h2>
        {{#if allFilled}}
            <p>Your burger looks perfect! Ready to send to the kitchen?</p>
            <button type="submit" class="btn btn-success" id="confirm">Place Final Order</button>
        {{else}}
            <p>Warning: Some ingredients are missing from your selection.</p>
            <button type="button" class="btn btn-warning" id="go-back">Go Back and Finish</button>
        {{/if}}
        <p>Here is your custom burger:</p>
        <ul>
            <li>Bun: {{order.bun}}</li>
            <li>Protein: {{order.protein}}</li>
            <li>Toppings: {{order.toppings}}</li>
            <li>Sauces: {{order.sauces}}</li>
            <li>Extras: {{order.extras}}</li>
            <!-- doing this one like the previous versions only shows the url, wanted to show the image so the format is different here. -->
            <li class="finalpicture"><strong>Presentation:</strong><br><img src="{{order.presentation}}" class="finalburgerimage"></li>
        </ul>
        <!-- takes the user back to the beginning -->
        <button type="submit" class="btn btn-dark" id="home">Go to Start</button>
    </div>
</script>
<script src="controller.js"></script>
    </body>
</html>
